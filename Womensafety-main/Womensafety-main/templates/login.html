<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Women Safety</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='login_style.css') }}">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pastel-pink': '#FFD1DC',
                        'pastel-purple': '#E6E6FA',
                        'pastel-blue': '#B0E0E6',
                        'pastel-green': '#98FB98',
                        'pastel-yellow': '#FFFACD',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-pastel-purple">
    <!-- Navigation -->
    <nav class="bg-pastel-pink text-gray-800 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="{{ url_for('index') }}" class="text-2xl font-bold hover:text-purple-600 transition duration-300">Women Safety</a>
            <div class="space-x-4">
                <a href="{{ url_for('safety_tips') }}" class="hover:text-purple-600">Safety Tips</a>
                <a href="{{ url_for('volunteer') }}" class="hover:text-purple-600">Volunteer</a>
                <a href="{{ url_for('login') }}" class="hover:text-purple-600">Login</a>
                <a href="{{ url_for('register') }}" class="hover:text-purple-600">Register</a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white p-8 rounded-lg shadow-lg">
            <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login</h2>
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    {% for message in messages %}
                        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative mb-4" role="alert">
                            <span class="block sm:inline">{{ message }}</span>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
                <div>
                    <label class="block text-gray-700 mb-2" for="email">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input type="email" id="email" name="email" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-pastel-pink" placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label class="block text-gray-700 mb-2" for="password">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-500">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" required class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-pastel-pink" placeholder="Enter your password">
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input type="checkbox" id="remember" class="h-4 w-4 text-pastel-pink focus:ring-pastel-pink border-gray-300 rounded">
                        <label for="remember" class="ml-2 block text-sm text-gray-700">Remember me</label>
                    </div>
                    <a href="#" class="text-sm text-pastel-pink hover:text-pink-400">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-pastel-pink text-gray-800 py-2 rounded-lg hover:bg-pink-300 transition duration-300">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-600">Don't have an account? <a href="{{ url_for('register') }}" class="text-pastel-pink hover:text-pink-400">Register here</a></p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- <footer class="bg-pastel-pink text-gray-800 py-8 mt-12">
        <div class="container mx-auto text-center">
            <p>&copy; 2024 Women Safety. All rights reserved.</p>
            <div class="mt-4 space-x-4">
                <a href="#" class="hover:text-purple-600">Privacy Policy</a>
                <a href="#" class="hover:text-purple-600">Terms of Service</a>
                <a href="#" class="hover:text-purple-600">Contact Us</a>
            </div>
        </div>
    </footer> -->
</body>
</html>
